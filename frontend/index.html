<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeAI — Smart Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0f0f13;color:#fff;min-height:100vh}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid rgba(255,255,255,0.06)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:#6C63FF;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-text{font-size:15px;font-weight:600;letter-spacing:-.02em}
  .nav-badge{font-size:11px;color:#6C63FF;background:rgba(108,99,255,0.12);padding:4px 10px;border-radius:20px;border:1px solid rgba(108,99,255,0.25)}
  .hero{text-align:center;padding:64px 40px 48px}
  .eyebrow{font-size:12px;font-weight:500;color:#6C63FF;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
  h1{font-size:42px;font-weight:600;letter-spacing:-.03em;line-height:1.15;margin-bottom:14px}
  h1 span{color:#6C63FF}
  .subtitle{font-size:15px;color:rgba(255,255,255,0.45);max-width:480px;margin:0 auto 40px;line-height:1.7}
  .main{max-width:680px;margin:0 auto;padding:0 24px}
  .card{background:#17171f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:28px}
  .card-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
  .upload-box{border:1.5px dashed rgba(108,99,255,0.35);border-radius:12px;padding:28px;text-align:center;background:rgba(108,99,255,0.04);margin-bottom:20px;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
  .upload-box:hover{border-color:rgba(108,99,255,0.6);background:rgba(108,99,255,0.07)}
  .upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{width:40px;height:40px;background:rgba(108,99,255,0.1);border-radius:10px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
  .upload-box .main-text{font-size:14px;color:rgba(255,255,255,0.75);font-weight:500}
  .upload-box .sub-text{font-size:13px;color:rgba(255,255,255,0.35);margin-top:4px}
  .upload-box.has-file{border-color:rgba(29,158,117,0.5);background:rgba(29,158,117,0.05)}
  .upload-box.has-file .main-text{color:#1D9E75}
  textarea{width:100%;background:#0f0f13;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;font-size:14px;color:rgba(255,255,255,0.8);font-family:inherit;resize:vertical;min-height:130px;outline:none;transition:border-color .2s;margin-bottom:20px;line-height:1.6}
  textarea:focus{border-color:rgba(108,99,255,0.5)}
  textarea::placeholder{color:rgba(255,255,255,0.2)}
  .btn{width:100%;background:#6C63FF;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:-.01em;transition:background .2s,transform .1s;font-family:inherit}
  .btn:hover:not(:disabled){background:#5b52ee}
  .btn:active:not(:disabled){transform:scale(0.99)}
  .btn:disabled{background:rgba(108,99,255,0.4);cursor:not-allowed}
  #result{display:none;max-width:680px;margin:32px auto 0;padding:0 24px 60px}
  .loading-state{text-align:center;padding:48px 0}
  .spinner{width:36px;height:36px;border:2px solid rgba(108,99,255,0.2);border-top-color:#6C63FF;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-state p{font-size:14px;color:rgba(255,255,255,0.4)}
  .score-section{display:flex;align-items:center;gap:24px;background:#17171f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:28px;margin-bottom:16px}
  .score-ring{position:relative;width:90px;height:90px;flex-shrink:0}
  .score-ring svg{transform:rotate(-90deg)}
  .score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num{font-size:26px;font-weight:600;line-height:1}
  .score-pct{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
  .score-info h3{font-size:16px;font-weight:500;margin-bottom:8px}
  .score-info p{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .rcard{background:#17171f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px}
  .rcard h4{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
  .rcard ul{list-style:none;padding:0}
  .rcard li{font-size:13px;color:rgba(255,255,255,0.6);padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.55;display:flex;gap:8px;align-items:flex-start}
  .rcard li:last-child{border:none;padding-bottom:0}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .dot-g{background:#1D9E75}
  .dot-r{background:#E24B4A}
  .strengths h4{color:#1D9E75}
  .gaps h4{color:#E24B4A}
  .kcard{background:#17171f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px;margin-bottom:16px}
  .kcard h4{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#BA7517;margin-bottom:14px}
  .kw-wrap{display:flex;flex-wrap:wrap;gap:8px}
  .kw{background:rgba(186,117,23,0.1);color:#EF9F27;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid rgba(186,117,23,0.2);font-weight:500}
  .tcard{background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.18);border-radius:16px;padding:22px}
  .tcard h4{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#6C63FF;margin-bottom:10px}
  .tcard p{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7}
  .error-msg{background:rgba(226,75,74,0.08);border:1px solid rgba(226,75,74,0.2);border-radius:12px;padding:16px 20px;color:#F09595;font-size:14px;text-align:center}
  @media(max-width:580px){
    h1{font-size:28px}
    nav{padding:16px 20px}
    .hero{padding:40px 20px 32px}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 14L9 4L15 14H3Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-text">ResumeAI</span>
  </div>
  <span class="nav-badge">Powered by Gemini</span>
</nav>

<div class="hero">
  <div class="eyebrow">AI-powered resume analysis</div>
  <h1>Get hired faster with<br><span>smarter insights</span></h1>
  <p class="subtitle">Upload your resume, paste a job description, and get an instant match score with actionable feedback.</p>
</div>

<div class="main">
  <div class="card">
    <div class="card-label">Your resume</div>
    <div class="upload-box" id="dropzone">
      <input type="file" id="resume" accept=".pdf,.docx" onchange="onFileChange(this)">
      <div class="upload-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="main-text" id="upload-main">Drop your PDF or DOCX here</div>
      <div class="sub-text" id="upload-sub">or click to browse files</div>
    </div>

    <div class="card-label">Job description</div>
    <textarea id="jd" placeholder="Paste the full job description here..."></textarea>

    <button class="btn" id="btn" onclick="runAnalysis()">Analyze my resume</button>
  </div>
</div>

<div id="result"></div>

<script>
function onFileChange(input) {
  const box = document.getElementById('dropzone');
  const main = document.getElementById('upload-main');
  const sub = document.getElementById('upload-sub');
  if (input.files[0]) {
    box.classList.add('has-file');
    main.textContent = input.files[0].name;
    sub.textContent = (input.files[0].size / 1024).toFixed(0) + ' KB — ready to analyze';
  }
}

async function runAnalysis() {
  const file = document.getElementById('resume').files[0];
  const jd = document.getElementById('jd').value.trim();
  const btn = document.getElementById('btn');
  const out = document.getElementById('result');

  if (!file) { alert('Please upload your resume first.'); return; }
  if (!jd) { alert('Please paste a job description.'); return; }

  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  out.style.display = 'block';
  out.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Analyzing your resume with AI...</p></div>`;

  const form = new FormData();
  form.append('file', file);
  form.append('job_description', jd);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResult(data);
  } catch(e) {
    out.innerHTML = `<div class="main" style="padding-bottom:40px"><div class="error-msg">Something went wrong: ${e.message || 'Please check the server and try again.'}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Analyze my resume';
}

function scoreColor(s) {
  return s >= 70 ? '#1D9E75' : s >= 40 ? '#EF9F27' : '#E24B4A';
}

function scoreLabel(s) {
  if (s >= 80) return "Excellent match — you're a strong candidate";
  if (s >= 60) return "Good match — a few gaps to bridge";
  if (s >= 40) return "Moderate match — several areas to improve";
  return "Low match — significant gaps detected";
}

function renderResult(d) {
  const color = scoreColor(d.match_score);
  const r = 38;
  const circ = 2 * Math.PI * r;
  const dash = (d.match_score / 100) * circ;

  document.getElementById('result').innerHTML = `
  <div class="main" style="padding-top:0">
    <div class="score-section">
      <div class="score-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <circle cx="45" cy="45" r="${r}" fill="none" stroke="${color}" stroke-width="5"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
        </svg>
        <div class="score-center">
          <div class="score-num" style="color:${color}">${d.match_score}</div>
          <div class="score-pct">% match</div>
        </div>
      </div>
      <div class="score-info">
        <h3>${scoreLabel(d.match_score)}</h3>
        <p>Here's a detailed breakdown of your strengths, gaps, and exactly what to fix to improve your chances.</p>
      </div>
    </div>

    <div class="grid2">
      <div class="rcard strengths">
        <h4>Strengths</h4>
        <ul>${d.strengths.map(s=>`<li><span class="dot dot-g"></span>${s}</li>`).join('')}</ul>
      </div>
      <div class="rcard gaps">
        <h4>Skill gaps</h4>
        <ul>${d.gaps.map(g=>`<li><span class="dot dot-r"></span>${g}</li>`).join('')}</ul>
      </div>
    </div>

    <div class="kcard">
      <h4>Missing keywords</h4>
      <div class="kw-wrap">${d.missing_keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
    </div>

    <div class="tcard">
      <h4>Rewrite tip</h4>
      <p>${d.rewrite_tip}</p>
    </div>
  </div>`;
}
</script>
</body>
</html>
